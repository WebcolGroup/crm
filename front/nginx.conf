server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Angular HTML5 routing — todas las rutas apuntan al index
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets con hash en el nombre (Angular los versiona)
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sin cache para index.html (siempre la versión más reciente)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript application/wasm;
}
